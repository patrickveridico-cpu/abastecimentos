<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUEL_INTEL V2.1 // RESGATE 116</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #020617; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .font-header { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.1); }
        .tab-active { border-bottom: 3px solid var(--neon); color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; font-size: 13px !important; }
        .badge-cat { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #1e293b; color: var(--neon); border: 1px solid var(--neon); }
    </style>
</head>
<body class="p-4 md:p-8" onload="init()">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-cyan-900/30 pb-6">
            <div class="flex items-center gap-4">
                <img src="RESGATE NOVA SEM FUNDO.jpg" alt="Logo" class="h-16 w-16 object-contain">
                <div>
                    <h1 class="font-header text-2xl font-black text-cyan-400 italic">RESGATE_116 // V2.1</h1>
                    <p class="text-[10px] tracking-[0.3em] text-slate-500 uppercase mt-1">Dev. Patrick Almeida</p>
                </div>
            </div>
            <nav class="flex gap-6 mt-6 md:mt-0 font-header text-[10px]">
                <button onclick="switchTab('lançamento')" id="tab-lançamento" class="tab-active py-2">LANÇAMENTO</button>
                <button onclick="switchTab('frota')" id="tab-frota" class="text-slate-500 py-2">FROTA</button>
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="text-slate-500 py-2">DASHBOARD</button>
            </nav>
        </header>

        <section id="sec-lançamento" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass p-6 rounded-3xl h-fit border-t-4 border-t-cyan-500">
                <h2 class="font-header text-sm mb-6 text-cyan-300 italic">REGISTRAR ABASTECIMENTO</h2>
                <div class="space-y-4">
                    <select id="selViatura" class="w-full p-4 rounded-xl"></select>
                    <div class="grid grid-cols-2 gap-3">
                        <input id="inData" type="date" class="w-full p-3 rounded-xl">
                        <input id="inHora" type="time" step="1" class="w-full p-3 rounded-xl">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input id="inLitros" type="text" oninput="mascaraDecimal(this)" class="w-full p-4 rounded-xl font-bold text-cyan-400" placeholder="Litros (0,000)">
                        <input id="inKM" type="text" oninput="mascaraKM(this)" class="w-full p-4 rounded-xl font-bold" placeholder="KM (000.000)">
                    </div>
                    <button onclick="registrarAbastecimento()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-2xl font-header font-bold shadow-lg">SALVAR</button>
                </div>
            </div>

            <div class="lg:col-span-2 glass rounded-3xl overflow-hidden flex flex-col">
                <div class="p-4 bg-slate-900/50 border-b border-slate-800 flex flex-wrap gap-3 items-center">
                    <span class="font-header text-[10px] text-cyan-500 mr-auto">HISTÓRICO GLOBAL</span>
                    <input type="date" id="filtroDataGeral" onchange="renderTabela()" class="p-2 rounded text-[10px]">
                    <input type="text" id="filtroPlacaGeral" oninput="renderTabela()" placeholder="Placa/Frota" class="p-2 rounded text-[10px] w-24">
                </div>
                <div class="overflow-x-auto max-h-[500px]">
                    <table class="w-full text-[11px] text-left">
                        <thead class="bg-slate-950 text-slate-600 sticky top-0">
                            <tr><th class="p-4">DATA/HORA</th><th class="p-4">FROTA</th><th class="p-4">KM</th><th class="p-4">LITROS</th><th class="p-4">MÉDIA</th></tr>
                        </thead>
                        <tbody id="listaAbastecimentos" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="sec-frota" class="hidden">
            <div class="glass p-8 rounded-3xl mb-8">
                <h2 class="font-header text-sm mb-6 text-cyan-400">CONFIGURAÇÃO DE VIATURA</h2>
                <input type="hidden" id="editId">
                <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                    <input id="cadApelido" type="text" placeholder="Nº FROTA" class="p-4 rounded-xl font-black text-center">
                    <input id="cadPlaca" type="text" placeholder="PLACA" class="p-4 rounded-xl uppercase">
                    <input id="cadModelo" type="text" placeholder="MODELO" class="p-4 rounded-xl">
                    <select id="cadCategoria" class="p-4 rounded-xl">
                        <option value="Carro">CARRO</option>
                        <option value="3/4">3/4</option>
                        <option value="Caminhão">CAMINHÃO</option>
                    </select>
                    <button onclick="salvarViatura()" class="bg-cyan-600 font-bold rounded-xl text-[10px]">SALVAR</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4" id="gridViaturas"></div>
        </section>

        <section id="sec-dashboard" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="rankingsCategoria"></div>

            <div class="glass p-6 rounded-3xl">
                <div class="flex flex-col md:flex-row gap-4 justify-between mb-6">
                    <select id="selDashViatura" onchange="gerarDashIndividual()" class="p-3 rounded-xl bg-slate-900 text-cyan-400 font-bold border border-cyan-900 w-full md:w-64"></select>
                    <div class="flex gap-2">
                        <input type="date" id="filtroDataInd" onchange="renderHistoricoInd()" class="p-2 rounded text-xs bg-slate-800">
                        <button onclick="exportarPDFIndividual()" class="bg-red-900 text-white px-4 py-2 rounded-xl text-[10px] font-bold">PDF</button>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 h-[350px]">
                        <canvas id="graficoEvolucao"></canvas>
                    </div>
                    <div class="flex flex-col justify-center items-center p-6 border-l border-slate-800">
                        <span class="text-[10px] text-slate-500 uppercase">Média Geral</span>
                        <div id="mediaGeralIndividual" class="text-6xl font-header text-cyan-400">--</div>
                        <div id="alertaFuro" class="mt-4 p-3 bg-red-900/20 rounded-lg hidden">
                            <p class="text-red-500 text-[10px] font-bold">⚠️ FURO DETECTADO!</p>
                            <p id="periodoFuro" class="text-white text-[9px] mt-1"></p>
                        </div>
                    </div>
                </div>

                <div class="mt-8 overflow-x-auto">
                    <h4 class="text-[10px] font-header text-slate-500 mb-4 uppercase">Histórico da Unidade</h4>
                    <table class="w-full text-[10px] text-left">
                        <thead class="bg-slate-900">
                            <tr><th class="p-3">DATA</th><th class="p-3">HODÔMETRO</th><th class="p-3">LITROS</th><th class="p-3">MÉDIA</th></tr>
                        </thead>
                        <tbody id="listaHistInd" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script>
        const _URL = "https://olldeytolxdzxxvciyon.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9sbGRleXRvbHhkenh4dmNpeW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODM2MDUsImV4cCI6MjA5MTE1OTYwNX0.r3LxebF13PYt-boPFqPUsZ03y5CSD4-6iSUEE_huhXE";
        const supabaseClient = supabase.createClient(_URL, _KEY);
        
        let viaturas = [];
        let abastecimentos = [];
        let chart = null;

        function mascaraKM(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            i.value = v;
        }

        function mascaraDecimal(i) {
            let v = i.value.replace(/\D/g, "");
            v = (Number(v) / 1000).toFixed(3).replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            i.value = v;
        }

        function limparMascaras(v) {
            return parseFloat(v.replace(/\./g, "").replace(",", "."));
        }

        async function init() {
            const agora = new Date();
            document.getElementById('inData').value = agora.toISOString().split('T')[0];
            document.getElementById('inHora').value = agora.toTimeString().split(' ')[0];
            await carregarDados();
        }

        async function carregarDados() {
            const { data: v } = await supabaseClient.from('viaturas').select('*').order('apelido');
            viaturas = v || [];
            const { data: a } = await supabaseClient.from('abastecimentos').select('*, viaturas(*)').order('data_hora', { ascending: false });
            abastecimentos = a || [];

            const options = viaturas.map(x => `<option value="${x.id}">${x.apelido} - ${x.placa}</option>`).join('');
            document.getElementById('selViatura').innerHTML = options;
            document.getElementById('selDashViatura').innerHTML = options;
            
            renderTabela();
            renderFrota();
            renderRankings();
        }

        function renderTabela() {
            const filtroData = document.getElementById('filtroDataGeral').value;
            const filtroPlaca = document.getElementById('filtroPlacaGeral').value.toUpperCase();
            
            const filtrados = abastecimentos.filter(a => {
                const dataMatch = filtroData ? a.data_hora.startsWith(filtroData) : true;
                const placaMatch = a.viaturas.placa.includes(filtroPlaca) || a.viaturas.apelido.includes(filtroPlaca);
                return dataMatch && placaMatch;
            });

            document.getElementById('listaAbastecimentos').innerHTML = filtrados.map(a => `
                <tr class="hover:bg-white/5">
                    <td class="p-4 text-slate-500">${new Date(a.data_hora).toLocaleString('pt-BR')}</td>
                    <td class="p-4 font-bold text-cyan-400">#${a.viaturas.apelido}</td>
                    <td class="p-4">${a.hodometro_atual.toLocaleString('pt-BR')}</td>
                    <td class="p-4">${a.litros.toLocaleString('pt-BR', {minimumFractionDigits: 3})}L</td>
                    <td class="p-4 font-bold ${a.media_trecho > 5 ? 'text-green-400' : 'text-red-400'}">${a.media_trecho}</td>
                </tr>
            `).join('');
        }

        async function salvarViatura() {
            const id = document.getElementById('editId').value;
            const payload = { 
                apelido: document.getElementById('cadApelido').value,
                placa: document.getElementById('cadPlaca').value.toUpperCase(),
                modelo: document.getElementById('cadModelo').value,
                categoria: document.getElementById('cadCategoria').value
            };
            if(id) await supabaseClient.from('viaturas').update(payload).eq('id', id);
            else await supabaseClient.from('viaturas').insert([payload]);
            location.reload();
        }

        function renderFrota() {
            document.getElementById('gridViaturas').innerHTML = viaturas.map(v => `
                <div class="glass p-5 rounded-2xl border-b-2 border-cyan-800">
                    <div class="flex justify-between items-start mb-2">
                        <span class="bg-cyan-500 text-black font-black px-2 py-1 rounded text-xs">${v.apelido}</span>
                        <span class="badge-cat">${v.categoria || 'N/A'}</span>
                    </div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase truncate">${v.modelo}</p>
                    <div class="flex gap-3 mt-4">
                        <button onclick="prepararEdicao('${v.id}')" class="text-[9px] text-cyan-400 uppercase">Editar</button>
                        <button onclick="excluirViatura('${v.id}')" class="text-[9px] text-red-500 uppercase">Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        function renderRankings() {
            const categorias = ['Carro', '3/4', 'Caminhão'];
            const container = document.getElementById('rankingsCategoria');
            
            container.innerHTML = categorias.map(cat => {
                const logsCat = abastecimentos.filter(a => a.viaturas.categoria === cat && a.media_trecho > 0);
                const medias = {};
                logsCat.forEach(l => {
                    if(!medias[l.viaturas.apelido]) medias[l.viaturas.apelido] = [];
                    medias[l.viaturas.apelido].push(Number(l.media_trecho));
                });

                const ranking = Object.keys(medias).map(apelido => {
                    const avg = medias[apelido].reduce((a,b) => a+b, 0) / medias[apelido].length;
                    return { apelido, avg: avg.toFixed(2) };
                }).sort((a,b) => b.avg - a.avg);

                const melhor = ranking[0] || { apelido: '---', avg: '0.00' };
                const pior = ranking.length > 1 ? ranking[ranking.length - 1] : { apelido: '---', avg: '0.00' };

                return `
                    <div class="glass p-4 rounded-2xl border-t-2 border-cyan-500">
                        <h3 class="text-[10px] font-header text-slate-500 uppercase mb-3">${cat}</h3>
                        <div class="flex justify-between items-center">
                            <div><p class="text-[9px] text-green-500">MELHOR</p><p class="font-bold text-white">#${melhor.apelido}</p></div>
                            <div class="text-right"><p class="text-2xl font-header text-green-400">${melhor.avg}</p></div>
                        </div>
                        <div class="flex justify-between items-center mt-3 pt-3 border-t border-slate-800">
                            <div><p class="text-[9px] text-red-500">PIOR</p><p class="font-bold text-slate-500">#${pior.apelido}</p></div>
                            <div class="text-right"><p class="text-lg font-header text-red-900">${pior.avg}</p></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function registrarAbastecimento() {
            const v_id = document.getElementById('selViatura').value;
            const litros = limparMascaras(document.getElementById('inLitros').value);
            const km = limparMascaras(document.getElementById('inKM').value);
            const dataStr = `${document.getElementById('inData').value}T${document.getElementById('inHora').value}`;
            const v = viaturas.find(x => x.id === v_id);
            if(km <= v.ultimo_hodometro) return alert("Erro: KM Menor!");
            let media = v.ultimo_hodometro > 0 ? ((km - v.ultimo_hodometro) / litros).toFixed(3) : 0;
            await supabaseClient.from('abastecimentos').insert([{ viatura_id: v_id, litros, hodometro_atual: km, media_trecho: media, data_hora: dataStr }]);
            await supabaseClient.from('viaturas').update({ ultimo_hodometro: km }).eq('id', v_id);
            location.reload();
        }

        function gerarDashIndividual() {
            renderHistoricoInd();
            const id = document.getElementById('selDashViatura').value;
            const logs = abastecimentos.filter(a => a.viatura_id === id).reverse();
            if(logs.length === 0) return;

            // Média Geral
            const avg = logs.filter(l => l.media_trecho > 0).reduce((a,c) => a+Number(c.media_trecho), 0) / logs.filter(l => l.media_trecho > 0).length;
            document.getElementById('mediaGeralIndividual').innerText = avg.toFixed(2);

            // Detecção de Furo Cronológico
            const alerta = document.getElementById('alertaFuro');
            alerta.classList.add('hidden');
            for(let i=1; i < logs.length; i++) {
                if(logs[i].hodometro_atual - logs[i-1].hodometro_atual > 1500) {
                    alerta.classList.remove('hidden');
                    const d1 = new Date(logs[i-1].data_hora).toLocaleDateString();
                    const d2 = new Date(logs[i].data_hora).toLocaleDateString();
                    document.getElementById('periodoFuro').innerText = `Entre ${d1} e ${d2}`;
                    break;
                }
            }

            if(chart) chart.destroy();
            chart = new Chart(document.getElementById('graficoEvolucao'), {
                type: 'line',
                data: {
                    labels: logs.map(l => new Date(l.data_hora).toLocaleDateString()),
                    datasets: [{ data: logs.map(l => l.media_trecho), borderColor: '#00f2ff', tension: 0.3, fill: true, backgroundColor: 'rgba(0,242,255,0.05)' }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function renderHistoricoInd() {
            const id = document.getElementById('selDashViatura').value;
            const filtroData = document.getElementById('filtroDataInd').value;
            const logs = abastecimentos.filter(a => {
                const isViatura = a.viatura_id === id;
                const dateMatch = filtroData ? a.data_hora.startsWith(filtroData) : true;
                return isViatura && dateMatch;
            });

            document.getElementById('listaHistInd').innerHTML = logs.map(a => `
                <tr>
                    <td class="p-3 text-slate-500">${new Date(a.data_hora).toLocaleString('pt-BR')}</td>
                    <td class="p-3 font-bold">${a.hodometro_atual.toLocaleString('pt-BR')} KM</td>
                    <td class="p-3">${a.litros.toLocaleString('pt-BR', {minimumFractionDigits:3})} L</td>
                    <td class="p-3 font-bold text-cyan-400">${a.media_trecho}</td>
                </tr>
            `).join('');
        }

        function switchTab(t) {
            ['lançamento', 'frota', 'dashboard'].forEach(x => {
                document.getElementById('sec-'+x).classList.add('hidden');
                document.getElementById('tab-'+x).classList.replace('text-cyan-500', 'text-slate-500');
                document.getElementById('tab-'+x).classList.remove('tab-active');
            });
            document.getElementById('sec-' + t).classList.remove('hidden');
            document.getElementById('tab-' + t).classList.replace('text-slate-500', 'text-cyan-500');
            document.getElementById('tab-' + t).classList.add('tab-active');
            if(t === 'dashboard') gerarDashIndividual();
        }

        function prepararEdicao(id) {
            const v = viaturas.find(x => x.id === id);
            document.getElementById('editId').value = v.id;
            document.getElementById('cadApelido').value = v.apelido;
            document.getElementById('cadPlaca').value = v.placa;
            document.getElementById('cadModelo').value = v.modelo;
            document.getElementById('cadCategoria').value = v.categoria || 'Carro';
            switchTab('frota');
        }

        async function excluirViatura(id) {
            if(confirm("Excluir viatura e histórico?")) {
                await supabaseClient.from('abastecimentos').delete().eq('viatura_id', id);
                await supabaseClient.from('viaturas').delete().eq('id', id);
                location.reload();
            }
        }
    </script>
</body>
</html>
