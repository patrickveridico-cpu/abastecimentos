<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUEL_INTEL V2 // RESGATE 116</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #020617; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .font-header { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(0, 242, 255, 0.1); }
        .tab-active { border-bottom: 3px solid var(--neon); color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        input, select { background: #0f172a !important; border: 1px solid #1e293b !important; color: white !important; }
        .apelido-badge { background: var(--neon); color: #000; font-weight: 900; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
        .btn-danger { border: 1px solid #ef4444; color: #ef4444; }
        .btn-danger:hover { background: #ef4444; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-cyan-900/30 pb-6">
            <div class="flex items-center gap-4">
                <img src="RESGATE NOVA SEM FUNDO.jpg" alt="Logo" class="h-16 w-16 object-contain">
                <div>
                    <h1 class="font-header text-2xl font-black text-cyan-400 italic leading-none text-center">RESGATE_116 // V2.0</h1>
                    <p class="text-[10px] tracking-[0.3em] text-slate-500 uppercase mt-1">Dev. Patrick Almeida</p>
                </div>
            </div>
            
            <nav class="flex gap-6 mt-6 md:mt-0 font-header text-[10px]">
                <button onclick="switchTab('lançamento')" id="tab-lançamento" class="tab-active py-2">LANÇAMENTO</button>
                <button onclick="switchTab('frota')" id="tab-frota" class="text-slate-500 py-2">GERENCIAR FROTA</button>
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="text-slate-500 py-2">DASHBOARD</button>
            </nav>
        </header>

        <section id="sec-lançamento" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass p-6 rounded-3xl h-fit border-t-4 border-t-cyan-500">
                <h2 class="font-header text-sm mb-6 text-cyan-300 italic">REGISTRAR ABASTECIMENTO</h2>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase">Viatura</label>
                        <select id="selViatura" class="w-full p-3 rounded-xl mt-1"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-slate-500 uppercase">Data</label>
                            <input id="inData" type="date" class="w-full p-3 rounded-xl mt-1 text-xs">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 uppercase">Hora</label>
                            <input id="inHora" type="time" step="1" class="w-full p-3 rounded-xl mt-1 text-xs">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] text-slate-500 uppercase">Litros</label>
                            <input id="inLitros" type="text" oninput="mascaraDecimal(this)" class="w-full p-3 rounded-xl mt-1 font-bold text-cyan-400" placeholder="0,000">
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-500 uppercase">Hodômetro</label>
                            <input id="inKM" type="text" oninput="mascaraKM(this)" class="w-full p-3 rounded-xl mt-1 font-bold text-white" placeholder="000.000">
                        </div>
                    </div>
                    <button onclick="registrarAbastecimento()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white rounded-2xl font-header font-bold mt-4 shadow-lg shadow-cyan-900/40">SALVAR DADOS</button>
                </div>
            </div>

            <div class="lg:col-span-2 glass rounded-3xl overflow-hidden">
                <div class="p-4 bg-slate-900/50 border-b border-slate-800 flex justify-between">
                    <span class="font-header text-xs text-cyan-500">Últimos Registros</span>
                    <button onclick="exportarPDF('all')" class="text-[10px] bg-red-900/30 text-red-400 border border-red-900/50 px-3 py-1 rounded">GERAR PDF GERAL</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-[11px] text-left">
                        <thead class="bg-slate-950 text-slate-600 uppercase font-bold">
                            <tr><th class="p-4">Data/Hora</th><th class="p-4">Frota</th><th class="p-4">KM</th><th class="p-4">Litros</th><th class="p-4">Média</th></tr>
                        </thead>
                        <tbody id="listaAbastecimentos" class="divide-y divide-slate-800"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="sec-frota" class="hidden">
            <div class="glass p-8 rounded-3xl mb-8">
                <h2 class="font-header text-lg mb-6 text-cyan-400">CADASTRO / EDIÇÃO</h2>
                <input type="hidden" id="editId">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input id="cadApelido" type="text" placeholder="FROTA (Ex: 116)" class="p-4 rounded-xl font-black text-center border-2 border-cyan-500/30">
                    <input id="cadPlaca" type="text" placeholder="PLACA" class="p-4 rounded-xl uppercase">
                    <input id="cadModelo" type="text" placeholder="MODELO" class="p-4 rounded-xl">
                    <button id="btnCadastrar" onclick="salvarViatura()" class="bg-cyan-600 font-bold rounded-xl text-xs uppercase">Salvar Viatura</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="gridViaturas"></div>
        </section>

        <section id="sec-dashboard" class="hidden space-y-6">
            <div class="glass p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <select id="selDashViatura" onchange="gerarDashIndividual()" class="p-3 rounded-xl bg-slate-900 text-cyan-400 font-bold border border-cyan-900 w-64"></select>
                    <button onclick="exportarPDFIndividual()" class="bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold">PDF DA FROTA</button>
                </div>
                <div id="statusViatura" class="flex gap-4"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 glass p-6 rounded-3xl h-[400px]">
                    <canvas id="graficoEvolucao"></canvas>
                </div>
                <div class="glass p-6 rounded-3xl flex flex-col justify-center items-center text-center">
                    <h3 class="font-header text-xs text-slate-500 uppercase mb-4">Média Geral do Veículo</h3>
                    <div id="mediaGeralIndividual" class="text-6xl font-header text-cyan-400">--</div>
                    <div id="alertaFuro" class="mt-6 text-red-500 text-[10px] font-bold animate-pulse"></div>
                </div>
            </div>
        </section>

    </div>

    <script>
        const _URL = "https://olldeytolxdzxxvciyon.supabase.co";
        const _KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9sbGRleXRvbHhkenh4dmNpeW9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODM2MDUsImV4cCI6MjA5MTE1OTYwNX0.r3LxebF13PYt-boPFqPUsZ03y5CSD4-6iSUEE_huhXE";
        const supabaseClient = supabase.createClient(_URL, _KEY);
        
        let viaturas = [];
        let abastecimentos = [];
        let chart = null;

        // --- MÁSCARAS ---
        function mascaraKM(i) {
            let v = i.value.replace(/\D/g, "");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            i.value = v;
        }

        function mascaraDecimal(i) {
            let v = i.value.replace(/\D/g, "");
            v = (Number(v) / 1000).toFixed(3).replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            i.value = v;
        }

        function limparMascaras(v) {
            return parseFloat(v.replace(/\./g, "").replace(",", "."));
        }

        // --- CORE ---
        async function init() {
            const agora = new Date();
            document.getElementById('inData').value = agora.toISOString().split('T')[0];
            document.getElementById('inHora').value = agora.toTimeString().split(' ')[0];

            await carregarDados();
            renderTabela();
            renderFrota();
        }

        async function carregarDados() {
            const { data: v } = await supabaseClient.from('viaturas').select('*').order('apelido');
            viaturas = v || [];
            const { data: a } = await supabaseClient.from('abastecimentos').select('*, viaturas(*)').order('data_hora', { ascending: false });
            abastecimentos = a || [];

            const options = viaturas.map(x => `<option value="${x.id}">${x.apelido} - ${x.placa}</option>`).join('');
            document.getElementById('selViatura').innerHTML = options;
            document.getElementById('selDashViatura').innerHTML = options;
        }

        // --- ABA FROTA ---
        function renderFrota() {
            document.getElementById('gridViaturas').innerHTML = viaturas.map(v => `
                <div class="glass p-6 rounded-2xl flex flex-col items-center border-b-4 border-cyan-500">
                    <span class="apelido-badge mb-2">${v.apelido}</span>
                    <span class="text-xs font-bold text-slate-400 uppercase">${v.modelo}</span>
                    <span class="text-[10px] text-slate-600 mt-1">${v.placa}</span>
                    <div class="flex gap-2 mt-4">
                        <button onclick="prepararEdicao('${v.id}')" class="text-[10px] uppercase text-cyan-400 font-bold">Editar</button>
                        <button onclick="excluirViatura('${v.id}')" class="text-[10px] uppercase text-red-500 font-bold">Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        async function salvarViatura() {
            const id = document.getElementById('editId').value;
            const payload = { 
                apelido: document.getElementById('cadApelido').value,
                placa: document.getElementById('cadPlaca').value.toUpperCase(),
                modelo: document.getElementById('cadModelo').value
            };

            if(id) await supabaseClient.from('viaturas').update(payload).eq('id', id);
            else await supabaseClient.from('viaturas').insert([payload]);

            alert("Viatura salva!");
            location.reload();
        }

        function prepararEdicao(id) {
            const v = viaturas.find(x => x.id === id);
            document.getElementById('editId').value = v.id;
            document.getElementById('cadApelido').value = v.apelido;
            document.getElementById('cadPlaca').value = v.placa;
            document.getElementById('cadModelo').value = v.modelo;
            document.getElementById('btnCadastrar').innerText = "Atualizar Viatura";
            window.scrollTo(0,0);
        }

        async function excluirViatura(id) {
            if(confirm("Deseja excluir? Isso apagará o histórico também!")) {
                await supabaseClient.from('abastecimentos').delete().eq('viatura_id', id);
                await supabaseClient.from('viaturas').delete().eq('id', id);
                location.reload();
            }
        }

        // --- ABA LANÇAMENTO ---
        async function registrarAbastecimento() {
            const v_id = document.getElementById('selViatura').value;
            const litros = limparMascaras(document.getElementById('inLitros').value);
            const km = limparMascaras(document.getElementById('inKM').value);
            const dataStr = `${document.getElementById('inData').value}T${document.getElementById('inHora').value}`;
            
            const v = viaturas.find(x => x.id === v_id);
            if(km <= v.ultimo_hodometro) return alert("Erro: Hodômetro menor que o anterior ("+v.ultimo_hodometro+")");

            let media = v.ultimo_hodometro > 0 ? ((km - v.ultimo_hodometro) / litros).toFixed(3) : 0;

            const { error } = await supabaseClient.from('abastecimentos').insert([{ 
                viatura_id: v_id, litros, hodometro_atual: km, media_trecho: media, data_hora: dataStr 
            }]);

            if(!error) {
                await supabaseClient.from('viaturas').update({ ultimo_hodometro: km }).eq('id', v_id);
                alert("REGISTRADO COM SUCESSO!");
                location.reload();
            }
        }

        function renderTabela() {
            document.getElementById('listaAbastecimentos').innerHTML = abastecimentos.map(a => `
                <tr class="border-b border-slate-900/50 hover:bg-white/5">
                    <td class="p-4 text-slate-500 text-[10px]">${new Date(a.data_hora).toLocaleString('pt-BR')}</td>
                    <td class="p-4 font-bold text-cyan-400">#${a.viaturas.apelido}</td>
                    <td class="p-4">${a.hodometro_atual.toLocaleString('pt-BR')}</td>
                    <td class="p-4">${a.litros.toLocaleString('pt-BR', {minimumFractionDigits: 3})} L</td>
                    <td class="p-4 font-bold ${a.media_trecho > 5 ? 'text-green-400' : 'text-red-400'}">${a.media_trecho || '---'}</td>
                </tr>
            `).join('');
        }

        // --- DASHBOARD & LOGICA DE FURO ---
        function gerarDashIndividual() {
            const id = document.getElementById('selDashViatura').value;
            const logs = abastecimentos.filter(a => a.viatura_id === id).reverse();
            const v = viaturas.find(x => x.id === id);

            if(logs.length === 0) return;

            // Média Geral
            const somaMedias = logs.filter(l => l.media_trecho > 0).reduce((acc, cur) => acc + Number(cur.media_trecho), 0);
            const mediaGeral = (somaMedias / logs.filter(l => l.media_trecho > 0).length || 0).toFixed(2);
            document.getElementById('mediaGeralIndividual').innerText = mediaGeral;

            // Lógica de Furo (Se rodou mais de 1000km sem abastecer, avisa)
            let furo = false;
            for(let i=1; i < logs.length; i++) {
                if(logs[i].hodometro_atual - logs[i-1].hodometro_atual > 1500) furo = true;
            }
            document.getElementById('alertaFuro').innerText = furo ? "⚠️ ATENÇÃO: POSSÍVEL FALTA DE REGISTRO ENTRE HODÔMETROS!" : "";

            // Gráfico
            if(chart) chart.destroy();
            chart = new Chart(document.getElementById('graficoEvolucao'), {
                type: 'line',
                data: {
                    labels: logs.map(l => new Date(l.data_hora).toLocaleDateString()),
                    datasets: [{ label: 'KM/L', data: logs.map(l => l.media_trecho), borderColor: '#00f2ff', tension: 0.3 }]
                },
                options: { maintainAspectRatio: false, scales: { y: { grid: { color: '#1e293b' } }, x: { grid: { display: false } } } }
            });
        }

        // --- PDF ---
        async function exportarPDF(tipo) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const columns = ["Data", "Frota", "Placa", "Hodometro", "Litros", "Media"];
            
            let data = [];
            if(tipo === 'all') {
                data = abastecimentos.map(a => [new Date(a.data_hora).toLocaleDateString(), a.viaturas.apelido, a.viaturas.placa, a.hodometro_atual, a.litros, a.media_trecho]);
                doc.text("RELATORIO GERAL DE ABASTECIMENTOS - RESGATE 116", 10, 10);
            } else {
                const id = document.getElementById('selDashViatura').value;
                const v = viaturas.find(x => x.id === id);
                data = abastecimentos.filter(a => a.viatura_id === id).map(a => [new Date(a.data_hora).toLocaleDateString(), a.viaturas.apelido, a.viaturas.placa, a.hodometro_atual, a.litros, a.media_trecho]);
                doc.text("RELATORIO INDIVIDUAL - FROTA " + v.apelido, 10, 10);
            }

            doc.autoTable({ head: [columns], body: data, startY: 20 });
            doc.save("Relatorio_Combustivel.pdf");
        }

        function exportarPDFIndividual() { exportarPDF('ind'); }

        function switchTab(t) {
            ['lançamento', 'frota', 'dashboard'].forEach(x => {
                document.getElementById('sec-'+x).classList.add('hidden');
                document.getElementById('tab-'+x).classList.replace('text-cyan-500', 'text-slate-500');
                document.getElementById('tab-'+x).classList.remove('tab-active');
            });
            document.getElementById('sec-'+t).classList.remove('hidden');
            document.getElementById('tab-'+t).classList.replace('text-slate-500', 'text-cyan-500');
            document.getElementById('tab-'+t).classList.add('tab-active');
            if(t === 'dashboard') gerarDashIndividual();
        }

        init();
    </script>
</body>
</html>
